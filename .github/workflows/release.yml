name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            name: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="silo-${VERSION}-${{ matrix.name }}"
          mkdir -p dist/$OUT
          BIN="target/${{ matrix.target }}/release/silo"
          cp "$BIN" dist/$OUT/silo
          cp LICENSE README.md CHANGELOG.md dist/$OUT/
          if [[ "${{ matrix.os }}" == ubuntu-latest ]]; then
            tar -C dist -czf "dist/${OUT}.tar.gz" "$OUT"
          else
            strip "$BIN" 2>/dev/null || true
            tar -C dist -czf "dist/${OUT}.tar.gz" "$OUT"
          fi
          (cd dist && shasum -a 256 "${OUT}.tar.gz" > "${OUT}.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: silo-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;
          cd release
          cat *.sha256 > checksums.txt
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            release/*.tar.gz
            release/checksums.txt
