<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-label="silo header">
  <rect width="1280" height="480" fill="#0a0a0a"/>
  <!-- faint grid -->
  <g stroke="#141414" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="960" y1="0" x2="960" y2="480"/>
  </g>
  <!-- twin silos mark -->
  <g transform="translate(520 120)">
    <rect x="0" y="0" width="48" height="96" rx="24" fill="none" stroke="#fafafa" stroke-width="6"/>
    <rect x="72" y="0" width="48" height="96" rx="24" fill="none" stroke="#fafafa" stroke-width="6"/>
    <line x1="24" y1="108" x2="24" y2="120" stroke="#fafafa" stroke-width="6" stroke-linecap="round"/>
    <line x1="96" y1="108" x2="96" y2="120" stroke="#fafafa" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="640" y="300" text-anchor="middle" fill="#fafafa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="64" font-weight="600" letter-spacing="-1">silo</text>
  <text x="640" y="340" text-anchor="middle" fill="#737373" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">isolated Claude Code profiles</text>
</svg>
