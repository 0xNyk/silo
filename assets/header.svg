<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-label="silo header">
  <rect width="1280" height="480" fill="#0a0a0a"/>
  <g stroke="#141414" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>
  <!-- 10 silos across -->
  <g transform="translate(280 100)" fill="none" stroke="#fafafa" stroke-width="5" stroke-linecap="round">
    <g transform="translate(0 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(72 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(144 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(216 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(288 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(360 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(432 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(504 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(576 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
    <g transform="translate(648 0)"><rect width="36" height="80" rx="18"/><line x1="18" y1="88" x2="18" y2="100"/></g>
  </g>
  <text x="640" y="280" text-anchor="middle" fill="#fafafa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="64" font-weight="600" letter-spacing="-1">silo</text>
  <text x="640" y="320" text-anchor="middle" fill="#737373" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">as many isolated Claude Code profiles as you need</text>
</svg>
